<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kabuki-Cord Full-auto V2 Animation Test</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #090d12; color: #d8e1ea; }
      main { width: min(920px, calc(100vw - 48px)); }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 24px; color: #8997a5; }
      .comparison { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .card { border: 1px solid #25303b; border-radius: 12px; background: #10161c; padding: 18px; }
      .card h2 { margin: 0 0 12px; font-size: 13px; letter-spacing: .12em; color: #8997a5; }
      .stage { height: 256px; display: grid; place-items: center; border-radius: 8px; background: radial-gradient(circle at 50% 50%, rgba(239,107,120,.16), transparent 34%), #0d1319; overflow: hidden; }
      .sprite { width: 208px; height: 208px; background-repeat: no-repeat; background-position: 0 0; filter: drop-shadow(0 16px 16px rgba(0,0,0,.42)); }
      .old { background-image: url("../../src/nhi_zues/web/assets/mode-kabuki-full-auto-sheet.png"); background-size: 2496px 208px; animation: old 2.25s steps(12, end) infinite; }
      .v2 { background-image: url("../../src/nhi_zues/web/assets/mode-kabuki-full-auto-v2-sheet.png"); background-size: 1664px 208px; animation: v2 2.25s steps(8, end) infinite; }
      .notes { margin-top: 18px; padding: 14px 16px; border-left: 3px solid #ef6b78; background: #10161c; color: #8997a5; line-height: 1.5; }
      @keyframes old { to { background-position: -2496px 0; } }
      @keyframes v2 { to { background-position: -1664px 0; } }
      @media (max-width: 680px) { .comparison { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <h1>Full-auto transition test</h1>
      <p>Both sequences are shown at the actual 208px overlay size.</p>
      <section class="comparison">
        <article class="card"><h2>CURRENT · 12 FRAMES / 2.25S</h2><div class="stage"><div class="sprite old"></div></div></article>
        <article class="card"><h2>V2 TEST · 8 FRAMES / 2.25S</h2><div class="stage"><div class="sprite v2"></div></div></article>
      </section>
      <div class="notes">V2 keeps one oversized prop, one reveal axis, one charging-handle check, readable weight transfer, and one stable upward-away hero hold.</div>
    </main>
  </body>
</html>
