<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kabuki-Cord Dojo Sweep V2 Animation Test</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #090d12; color: #d8e1ea; }
      main { width: min(1120px, calc(100vw - 48px)); padding: 32px 0; }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 24px; color: #8997a5; }
      .comparison { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .card { border: 1px solid #25303b; border-radius: 12px; background: #10161c; padding: 18px; }
      .card.v2 { border-color: rgba(69, 214, 202, .42); }
      .card h2 { margin: 0 0 12px; font-size: 13px; letter-spacing: .12em; color: #8997a5; }
      .card.v2 h2 { color: #45d6ca; }
      .stage { aspect-ratio: 4 / 3; border-radius: 8px; background: #0d1319; overflow: hidden; }
      .stage img { display: block; width: 100%; height: 100%; object-fit: cover; image-rendering: auto; }
      .note { margin-top: 18px; padding: 14px 16px; border-radius: 9px; background: #10161c; color: #9cabb8; }
      @media (max-width: 760px) { .comparison { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <h1>Dojo Sweep monitor animation</h1>
      <p>Current crossfaded full scenes versus the fixed-camera V2 evidence sweep.</p>
      <section class="comparison">
        <article class="card">
          <h2>CURRENT · 48 FRAMES / 4.56S</h2>
          <div class="stage"><img id="currentFrame" alt="Current Dojo Sweep animation" /></div>
        </article>
        <article class="card v2">
          <h2>V2 TEST · 8 FRAMES / 2.4S</h2>
          <div class="stage"><img id="v2Frame" alt="Dojo Sweep V2 animation" /></div>
        </article>
      </section>
      <div class="note">V2 locks the alley, camera, actor identity, and broom. Only the sweep, dust, and crimson evidence slip change.</div>
    </main>
    <script>
      const current = Array.from({ length: 48 }, (_, index) =>
        `../../src/nhi_zues/web/assets/monitor_dojo_sweep_frames/frame_${String(index).padStart(3, "0")}.webp`
      );
      const v2 = Array.from({ length: 8 }, (_, index) =>
        `../../src/nhi_zues/web/assets/monitor_dojo_sweep_v2_frames/frame_${String(index).padStart(3, "0")}.webp`
      );
      let currentIndex = 0;
      let v2Index = 0;
      const currentFrame = document.getElementById("currentFrame");
      const v2Frame = document.getElementById("v2Frame");
      currentFrame.src = current[0];
      v2Frame.src = v2[0];
      current.forEach((src) => { const image = new Image(); image.src = src; });
      v2.forEach((src) => { const image = new Image(); image.src = src; });
      setInterval(() => { currentIndex = (currentIndex + 1) % current.length; currentFrame.src = current[currentIndex]; }, 95);
      setInterval(() => { v2Index = (v2Index + 1) % v2.length; v2Frame.src = v2[v2Index]; }, 300);
    </script>
  </body>
</html>
