name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install package
        run: python -m pip install -e .
      - name: Install CI tools
        run: python -m pip install build mypy pip-audit ruff
      - name: Compile Python sources
        run: python -m compileall -f src
      - name: Ruff lint
        run: python -m ruff check src tests scripts
      - name: Type-check V2 boundaries
        run: >-
          python -m mypy
          src/nhi_zues/app_paths.py
          src/nhi_zues/budget.py
          src/nhi_zues/config.py
          src/nhi_zues/secrets.py
          src/nhi_zues/settings.py
          src/nhi_zues/state_io.py
          src/nhi_zues/transport.py
          --ignore-missing-imports
          --follow-imports=skip
      - name: Run Python tests
        run: python -m unittest discover -s tests
      - name: Check JavaScript syntax
        run: |
          node --check src/nhi_zues/web/app.js
          node --check src/nhi_zues/web/monitor.js
          node --check src/nhi_zues/web/js/ui-helpers.js
      - name: Build and inspect wheel
        run: |
          python -m build --wheel
          python scripts/verify_wheel.py
      - name: Audit Python dependencies
        run: python -m pip_audit
      - name: Check version metadata
        run: python scripts/check_version.py --check-github-ref --print-latest-tag
      - name: Secret pattern scan
        run: python scripts/secret_scan.py
