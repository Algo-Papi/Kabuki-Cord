name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install package
        run: python -m pip install -e .
      - name: Install CI tools
        run: python -m pip install ruff
      - name: Compile Python sources
        run: python -m compileall -f src
      - name: Ruff correctness lint
        run: python -m ruff check src tests scripts --select E9,F63,F7,F82
      - name: Run Python tests
        run: python -m unittest discover -s tests
      - name: Check JavaScript syntax
        run: |
          node --check web/app.js
          node --check web/monitor.js
      - name: Check version metadata
        run: python scripts/check_version.py --check-github-ref --print-latest-tag
      - name: Secret pattern scan
        run: python scripts/secret_scan.py
