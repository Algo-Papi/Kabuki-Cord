name: Release

permissions:
  contents: write

on:
  push:
    tags: ["v2.*"]

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package and release checks
        shell: pwsh
        run: python -m pip install -e ".[dev]"
      - name: Validate tag version
        shell: pwsh
        run: python scripts/check_version.py --tag "${{ github.ref_name }}"
      - name: Verify source privacy boundary
        shell: pwsh
        run: python scripts/secret_scan.py
      - name: Run release tests
        shell: pwsh
        run: python -m unittest discover -s tests
      - name: Build and inspect wheel
        shell: pwsh
        run: |
          python -m build --wheel
          python scripts/verify_wheel.py
      - name: Configure optional Authenticode signing
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_PASSWORD }}
        run: |
          $HasPfx = -not [string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64)
          $HasPassword = -not [string]::IsNullOrWhiteSpace($env:SIGNING_PFX_PASSWORD)
          if ($HasPfx -xor $HasPassword) {
            throw "Signing configuration is incomplete. Configure both Windows code-signing secrets or neither."
          }
          if (-not $HasPfx) {
            Write-Warning "Publishing an unsigned Windows installer because no Authenticode credential is configured."
            "KABUKI_CORD_REQUIRE_SIGNATURE=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }
          $CertificatePath = Join-Path $env:RUNNER_TEMP "kabuki-cord-code-signing.pfx"
          try {
            [IO.File]::WriteAllBytes(
              $CertificatePath,
              [Convert]::FromBase64String($env:SIGNING_PFX_BASE64)
            )
          } catch {
            throw "WINDOWS_CODE_SIGNING_PFX_BASE64 is not valid base64."
          }
          $SecurePassword = ConvertTo-SecureString $env:SIGNING_PFX_PASSWORD -AsPlainText -Force
          $Certificate = Import-PfxCertificate `
            -FilePath $CertificatePath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $SecurePassword `
            -Exportable:$false
          Remove-Item -LiteralPath $CertificatePath -Force
          if (-not $Certificate -or -not $Certificate.HasPrivateKey) {
            throw "The imported signing certificate does not have an accessible private key."
          }
          if ($Certificate.EnhancedKeyUsageList.ObjectId -notcontains "1.3.6.1.5.5.7.3.3") {
            throw "The imported certificate is not valid for Authenticode code signing."
          }
          "KABUKI_CORD_SIGNING_CERT_THUMBPRINT=$($Certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KABUKI_CORD_REQUIRE_SIGNATURE=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build Windows release and checksum
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          if ($env:KABUKI_CORD_REQUIRE_SIGNATURE -eq "true") {
            ./installer/windows/Build-ReleaseZip.ps1 -Version $Version -RequireSignature
          } else {
            ./installer/windows/Build-ReleaseZip.ps1 -Version $Version
          }
      - name: Verify release privacy boundary
        shell: pwsh
        run: python scripts/verify_release_archive.py
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Windows notice: this release's installer is not currently Authenticode-signed. Verify the accompanying SHA-256 checksum before running it. Code signing may be added to future releases.
          files: |
            dist/Kabuki-Cord-*-windows.zip
            dist/Kabuki-Cord-*-windows.zip.sha256
