name: Release

permissions:
  contents: write

on:
  push:
    tags: ["v2.*"]

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package and release checks
        shell: pwsh
        run: python -m pip install -e ".[dev]"
      - name: Validate tag version
        shell: pwsh
        run: python scripts/check_version.py --tag "${{ github.ref_name }}"
      - name: Verify source privacy boundary
        shell: pwsh
        run: python scripts/secret_scan.py
      - name: Run release tests
        shell: pwsh
        run: python -m unittest discover -s tests
      - name: Build and inspect wheel
        shell: pwsh
        run: |
          python -m build --wheel
          python scripts/verify_wheel.py
      - name: Build Windows release and checksum
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          ./installer/windows/Build-ReleaseZip.ps1 -Version $Version
      - name: Verify release privacy boundary
        shell: pwsh
        run: python scripts/verify_release_archive.py
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Kabuki-Cord-*-windows.zip
            dist/Kabuki-Cord-*-windows.zip.sha256
